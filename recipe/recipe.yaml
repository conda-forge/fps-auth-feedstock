schema_version: 1

context:
  version: "0.10.0"

package:
  name: fps-auth
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-auth/fps_auth-${{ version }}.tar.gz
    sha256: 01b0c464b706ea08d99d3c4b282c856a93187c11d5f6ce35a52b9a4298cf68c2

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - jupyverse-api >=0.14.0,<0.15.0
    - aiosqlite <0.22.0
    - fastapi-users >=14.0.1,<15.0.0
    - fastapi-users-db-sqlalchemy >=6
    - httpx-oauth >=0.13
    - httpcore >0.13.3

tests:
  - python:
      imports: fps_auth
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/auth
  summary: An FPS plugin for the authentication API.

extra:
  recipe-maintainers:
    - davidbrochart
