schema_version: 1

context:
  version: "0.10.1"

package:
  name: fps-auth
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-auth/fps_auth-${{ version }}.tar.gz
    sha256: 7166492c144c5214356caa810813e251588ce74def2eac61d6628dfcde69cf92

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - aiosqlite <0.22.0
    - fastapi-core
    - fastapi-users >=14.0.1,<15.0.0
    - fastapi-users-db-sqlalchemy >=6
    - fps
    - httpx
    - httpx-oauth >=0.13
    - httpcore >0.13.3
    - jupyverse-api >=0.15.0,<0.16.0
    - jupyverse-auth >=0.2.0,<0.3.0
    - jupyverse-frontend >=0.1.0,<0.2.0
    - sqlalchemy
    - starlette
    - structlog

tests:
  - python:
      imports: fps_auth
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/auth
  summary: An FPS plugin for the authentication API.

extra:
  recipe-maintainers:
    - davidbrochart
